version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: repair_system_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-Root@2024}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-repair_system}
      MYSQL_USER: ${MYSQL_USER:-repair_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Repair@2024}
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - repair_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-Root@2024}"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: repair_system_redis
    restart: always
    volumes:
      - redis_data:/data
    networks:
      - repair_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    build: ./backend
    container_name: repair_system_backend
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      FLASK_ENV: production
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?必须设置 JWT_SECRET_KEY}
      DATABASE_URL: mysql+pymysql://${MYSQL_USER:-repair_user}:${MYSQL_PASSWORD:-Repair@2024}@mysql:3306/${MYSQL_DATABASE:-repair_system}?charset=utf8mb4
      REDIS_URL: redis://redis:6379/0
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost}
      UPLOAD_FOLDER: /app/uploads
      MAX_CONTENT_LENGTH_MB: 16
      SESSION_COOKIE_SECURE: "false"  # 容器内 HTTP，生产环境经 Nginx HTTPS 改 true
      COOKIE_SAMESITE: Lax
      TALISMAN_ENABLED: "false"
      SETUP_ENABLED: "true"
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "5000:5000"
    networks:
      - repair_network
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  frontend:
    build: ./frontend
    container_name: repair_system_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - repair_network

volumes:
  mysql_data:
  redis_data:
  backend_uploads:

networks:
  repair_network:
    driver: bridge